services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # Windows/Docker Desktop: file watching can miss events, force polling
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=300
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next

  web-prod:
    profiles: ["prod"]
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

volumes:
  node_modules:
  next_cache:
